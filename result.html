<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    text-align: center;
}

.box {
    margin-top: 100px;
    background: white;
    display: inline-block;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 10px gray;
}
</style>
</head>

<body>

<div class="box">

<h2>🎉 Quiz Result</h2>

<p><b>Name:</b> {{name}}</p>
<p><b>Score:</b> {{score}} / {{total}}</p>

</div>

</body>
</html>
